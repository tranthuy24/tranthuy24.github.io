<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Untitled Document</title>
<style type="text/css">
body {
	background-color: #FFF;
}
body, td, th {
	font-size: 36px;
	color: #0099FF;
}
	
.chao-mung {
    background: linear-gradient(to right, #DFF5FF, #B8E8FF);
    border: 3px dashed #00AEEF;
    border-radius: 15px;
    padding: 8px;
    box-shadow: 0px 3px 10px rgba(0,0,0,0.1);
}
	/* Chữ phát sáng */
.text-title{
    font-size: 36px;
    font-family: Verdana, Geneva, sans-serif;
    font-weight: bold;
    letter-spacing: 2px;

    color: #0066CC;

    text-shadow:
        0 0 5px #ffffff,
        0 0 10px #99ddff,
        0 0 15px #66ccff,
        0 0 20px #33bbff;

    animation: glow 2s infinite alternate;
}
	/* Hiệu ứng sáng nhẹ */
@keyframes glow{
    from{
        text-shadow:
            0 0 5px #ffffff,
            0 0 10px #99ddff,
            0 0 15px #66ccff;
    }

    to{
        text-shadow:
            0 0 10px #ffffff,
            0 0 20px #66ccff,
            0 0 30px #00aaff,
            0 0 40px #00aaff;
    }
}
</style>
</head>

<body topmargin="0" leftmargin="0" marginwidth="0" marginheight="0">
<table width="1945" border="0" cellspacing="0" cellpadding="0" align="left">
  <tbody>
    <tr>
      <td width="270" height="136" align="center" valign="top">
        <img src="image/ten.png" width="270" height="136" alt="Logo">
      </td>
      
      <td width="1675" valign="top">
        <table width="1667" border="0" cellpadding="0" cellspacing="0">
          <tbody>
            <tr>
              <td width="1062" height="42" valign="middle">
                 <div class="chao-mung">
                  <marquee direction="right">
                    <span class="text-title">
                      ✨ Chào mừng đến với trang WEB ✨
                    </span>
                  </marquee>
                </div>
              </td>
              <td width="210">&nbsp;</td>
              <td width="395" rowspan="2" valign="top">
                <img src="image/meobum.gif" width="228" height="135" alt="Meo">
              </td>
            </tr>
            <tr>
              <td height="88" align="left" valign="top">
                <img src="image/duongke.png" width="1062" height="85" alt="Duong ke">
              </td>
              <td height="88">&nbsp;</td>
            </tr>
          </tbody>
        </table>
      </td>
    </tr>
    
    <tr>
      <td height="45" bgcolor="#AED9E9">&nbsp;</td>
      
      <td bgcolor="#AED9E9">
        <table width="1667" border="0" cellpadding="0" cellspacing="0">
          <tbody>
            <tr>
              <td height="45" bgcolor="#AED9E9"style="color: #AED9E9">&nbsp;</td>
            </tr>
          </tbody>
        </table>
      </td>
    </tr>
  </tbody>
</table>
</body>
</html>

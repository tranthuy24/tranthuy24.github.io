<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Đồng hồ </title>
    <style>
        body {
    font-family: "Times New Roman", serif;
    background: #e0f2fe;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #FFFFFF;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 280px;
        }
        #dong-ho {
            background: #ffffff;
            border: 4px dashed #7dd3fc;
            border-radius: 20px;
            padding: 15px 25px;
            font-size: 28px;
            font-weight: bold;
            color: #0369a1;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        .img-group {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .img-group img {
            width: 400px;
            height: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Chỉ có giờ nằm trong viền -->
    <div id="dong-ho">00:00:00</div>
    

    <div class="img-group">
      <p>&nbsp;</p>
      <p><img src="images/meolac.gif" alt="Mèo lắc cute"></p>
    </div>
</div>

<script>
    function capNhatDongHo() {
        const bayGio = new Date();
        const chuoiThoiGian = bayGio.toLocaleTimeString('vi-VN');
        document.getElementById('dong-ho').innerText = chuoiThoiGian;
    }
    capNhatDongHo();
    setInterval(capNhatDongHo, 1000);
</script>

</body>
</html>

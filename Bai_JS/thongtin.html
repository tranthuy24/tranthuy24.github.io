<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Thông Tin Liên Hệ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0f2fe;
        
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .contact-card {
            background-color: #ffffff;
            border-top: 8px solid #87ceeb; 
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            padding: 30px;
            width: 450px;
            text-align: center;
          
            margin: auto; 
        }

        .contact-card h3 {
            color: #2a7596; 
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .contact-card hr {
            border: 0;
            height: 1px;
            background-color: #e0f2fe;
            margin-bottom: 20px;
        }

        .contact-info {
            color: #4a5568;
            font-size: 15px;
            line-height: 1.8;
        }

        .contact-info .name {
            font-size: 18px;
            font-weight: bold;
            color: #1a202c;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="contact-card">
    <script>
        document.writeln("<h3>Mọi chi tiết xin vui lòng liên hệ</h3>");
        document.writeln("<hr />");
        document.writeln("<div class='contact-info'>");
        document.writeln("  <div class='name'>Trần Ngọc Phương Thuỳ</div>");
        document.writeln("  <div>Trường Cao đẳng Kỹ thuật - Công nghệ Đồng Nai</div>");
        document.writeln("  <div><b>Điện thoại:</b> 090706****</div>");
        document.writeln("  <div><b>Email:</b> tranngocphuongthuy5@gmail.com</div>");
        document.writeln("</div>");
    </script>
</div>

</body>
</html>

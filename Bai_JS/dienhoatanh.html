<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>The Art of Van Gogh</title>
    <style type="text/css">
        body {
            font-family: "Times New Roman", serif;
            text-align: center;
            background: #0d1b2a;
            color: #fff;
            margin: 0;
            padding-top: 30px;
        }
        h1 {
            font-size: 38px;
            margin-bottom: 25px;
            letter-spacing: 3px;
            font-style: italic;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        /* Khung chứa cố định kích thước và chồng các ảnh lên nhau */
        .gallery-container {
            position: relative;
            width: 600px;
            height: 338px; 
            margin: 0 auto;
        }
        .gallery-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s ease-in-out; 
        }
       
        .gallery-container img.active {
            opacity: 1;
        }
    </style>
</head>

<body>

<h1>The Art of Van Gogh 🌙</h1>

<div class="gallery-container">
    <img src="images/vg1.jpg" class="active" />
    <img src="images/vg2.jpg" />
    <img src="images/vg3.jpg" />
</div>

<script>
    var danhSachAnh = document.querySelectorAll(".gallery-container img");
    var index = 0;

    function doiAnhMuotMa() {
        // để nó tự động mờ đi 
        danhSachAnh[index].classList.remove("active");
        
        
        index = (index + 1) % danhSachAnh.length;
        
        // để nó tự động hiện đè lên 
        danhSachAnh[index].classList.add("active");
    }

    // 2 giây sẽ kích hoạt chuyển ảnh một lần
    setInterval(doiAnhMuotMa, 2000);
</script>

</body>
</html>

<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Untitled Document</title>
    <style type="text/css">
        body {
            background: #ff6b6b; 
            font-family: "Times New Roman", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>

<body>
   
    <div id="thongBao"></div>

    <script>
        function doiMauTheoGiay() {
            var giay = new Date().getSeconds();
            var txt = document.getElementById("thongBao");
            
            if (giay % 2 === 0) {
                document.body.style.backgroundColor = "#ff6b6b"; 
                txt.innerHTML = "Giây Chẵn!";
            } else {
      
                document.body.style.backgroundColor = "#87ceeb"; 
                txt.innerHTML = "Giây Lẻ!";
            }
        }
        
        doiMauTheoGiay();
        setInterval(doiMauTheoGiay, 1000);
    </script>
</body>
</html>

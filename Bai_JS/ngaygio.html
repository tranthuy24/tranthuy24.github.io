<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Ngày và Đồng hồ</title>
    <style>
        body {
            font-family: "Times New Roman", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #FFFFFF;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 380px;
        }
        .box-hien-thi {
            background: #ffffff;
            border: 4px dashed #7dd3fc;
            border-radius: 20px;
            padding: 15px 20px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
     
        #ngay {
            color: #000000; 
        }
       
        #dong-ho {
            color: #0369a1;
            display: block;
            font-size: 28px;
            margin-top: 5px;
        }
        .img-group {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .img-group img {
            width: 200px;
            height: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="box-hien-thi">
        <span id="ngay"></span>
        <span id="dong-ho">00:00:00</span>
    </div>
    
    <div class="img-group">
        <img src="images/meolac.gif" alt="Mèo lắc cute">
    </div>
</div>

<script>
    function hienThiNgay() {
        var d = new Date();
        var dd = d.getDate();
        var mm = d.getMonth() + 1;
        var yyyy = d.getFullYear();
        document.getElementById('ngay').innerHTML = "Hôm nay, ngày " + dd + " tháng " + mm + " năm " + yyyy;
    }
    hienThiNgay();

    function capNhatDongHo() {
        const bayGio = new Date();
        const chuoiThoiGian = bayGio.toLocaleTimeString('vi-VN');
        document.getElementById('dong-ho').innerText = chuoiThoiGian;
    }
    capNhatDongHo();
    setInterval(capNhatDongHo, 1000);
</script>

</body>
</html>
